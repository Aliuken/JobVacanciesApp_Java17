name: "app-j17"

services:
  app-db-service:
    image: mysql:${DB_VERSION}
    container_name: app-db-container
    networks:
      internal-net-app:
        ipv4_address: 192.168.10.3
    ports:
      - ${DB_PORT}:3306
    environment:
      - MYSQL_DATABASE=job-vacancies-app-db
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
    restart: on-failure
    volumes:
      - mysql-data:/var/lib/mysql
      - ../../src/main/resources/db_dumps:/docker-entrypoint-initdb.d
    cap_add:
      - SYS_NICE
    env_file:
      - .env
    healthcheck:
      test: "mysql -uroot -padmin -e 'select 1'"
      interval: 1s
      retries: 120

  app-service:
    image: job-vacancies-app:${APP_VERSION}
    container_name: app-container
    networks:
      internal-net-app:
        ipv4_address: 192.168.10.2
      external-net-app:
        ipv4_address: 192.168.20.2
    ports:
      - ${APP_PORT}:8080
    environment:
      - MYSQL_HOST=app-db-container
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=${DB_ROOT_PASSWORD}
    restart: on-failure
    volumes:
      - /AppData_Java17/JobVacanciesApp:/AppData_Java17/JobVacanciesApp
    build:
      context: ..
      dockerfile: docker-compose-app/Dockerfile
      args:
        JAR_FILE: ../lib/*.jar
        PRINT_ARG: new_value
    env_file:
      - .env
    depends_on:
      app-db-service:
        condition: service_healthy

networks:
  internal-net-app:
    ipam:
      config:
        - subnet: 192.168.10.0/24
          gateway: 192.168.10.1
  external-net-app:
    ipam:
      config:
        - subnet: 192.168.20.0/24
          gateway: 192.168.20.1

volumes:
  mysql-data:
    driver: local